<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="dashboard">

    <div class="navbar">
        <div>
            <a href="/dashboard">Dashboard</a>
            <a href="/submit_project">Submit</a>
            <a href="/view_projects">View</a>
        </div>
        <a href="/logout">Logout</a>
    </div>

    <div class="card">
        <h3>Total Projects: {{ total }}</h3>
    </div>

    <div class="card">
        <h3>Progress</h3>
        <div class="progress">
            <div class="progress-bar" style="width: {{ total*10 }}%"></div>
        </div>
    </div>

</div>

</body>
</html>
